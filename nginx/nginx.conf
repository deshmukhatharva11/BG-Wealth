worker_processes auto;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/css application/javascript application/json text/plain text/xml application/xml;
    gzip_min_length 1024;

    # Request size limits (DDoS protection)
    client_max_body_size 1m;
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 10s;

    # Rate limiting zones for API endpoints
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=admin_api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=static:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # Proxy cache for admin API responses (1 min TTL)
    proxy_cache_path /var/cache/nginx/admin_cache levels=1:2 keys_zone=admin_cache:10m max_size=100m inactive=5m;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    upstream backend {
        server backend:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name bg-wealth.io www.bg-wealth.io;

        # Connection limit per IP
        limit_conn conn_limit 50;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Health check endpoint (no rate limit)
        location /health {
            proxy_pass http://backend/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Admin API — stricter rate limit
        location /api/admin/ {
            limit_req zone=admin_api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Longer timeout for balance refresh
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            # Cache GET responses for 1 minute
            proxy_cache admin_cache;
            proxy_cache_valid 200 1m;
            proxy_cache_methods GET;
            proxy_cache_key $request_uri;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # User API
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # WebSocket support (if needed in the future)
        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Static files and fallback
        location / {
            limit_req zone=static burst=80 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Cache images/fonts but NOT css/js (so changes show immediately)
            location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
                proxy_pass http://backend;
                expires 7d;
                add_header Cache-Control "public, max-age=604800";
            }
            location ~* \.(css|js)$ {
                proxy_pass http://backend;
                expires -1;
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma "no-cache";
            }
        }

        # Block access to sensitive files
        location ~ /\. {
            deny all;
        }
        location ~ \.env$ {
            deny all;
        }
        location ~ \.(sql|md|yml|yaml|json|lock|git|bak|swp|tmp)$ {
            deny all;
        }
    }
}
