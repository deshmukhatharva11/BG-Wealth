<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG-Wealth | Admin Login</title>
    <link rel="icon" type="image/jpeg" href="/BGWealth.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-primary);
            background-image:
                radial-gradient(ellipse at 30% 50%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 30%, rgba(232, 201, 98, 0.06) 0%, transparent 50%);
        }

        .login-card {
            background: rgba(13, 13, 22, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 2.8rem 2.5rem;
            width: 100%;
            max-width: 430px;
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.08), 0 20px 60px rgba(0,0,0,0.4);
            animation: fadeIn 0.6s ease-out;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header img {
            width: 64px;
            height: 64px;
            border-radius: 14px;
            object-fit: contain;
            background: rgba(212, 175, 55, 0.06);
            padding: 8px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.3));
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.4rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.45rem;
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .form-input {
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
            background: rgba(212, 175, 55, 0.03);
        }

        .login-btn {
            width: 100%;
            padding: 0.95rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.8rem;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .login-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-100%);
            transition: 0.5s;
        }

        .login-btn:hover::after {
            transform: translateX(100%);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 25px rgba(212, 175, 55, 0.35);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #fca5a5;
            padding: 0.9rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 1.2rem;
            display: none;
            text-align: center;
        }

        @media (max-width: 480px) {
            .login-card {
                margin: 1rem;
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-header">
            <img src="/BGWealth.jpg" alt="BG-Wealth">
            <h1
                style="background:linear-gradient(90deg, var(--primary), var(--primary-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:1.3rem;letter-spacing:1px;">
                BGW Admin Access</h1>
            <p style="color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-top: 0.3rem;">Secure Panel Login</p>
        </div>

        <div id="error-msg" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" id="username" class="form-input" required autocomplete="off"
                    placeholder="Enter username">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-input" required placeholder="Enter password">
            </div>
            <button type="submit" class="login-btn">🔐 Authenticate</button>
        </form>
    </div>

    <script src="admin.js"></script>
</body>

</html>
